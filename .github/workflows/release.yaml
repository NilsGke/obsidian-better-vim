name: Release Obsidian plugin

on:
    push:
        branches:
            - main

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    release:
        if: github.repository == 'NilsGke/obsidian-better-vim' && github.event.repository.fork == false
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get version
              id: version
              run: |
                  VERSION=$(node -p "require('./manifest.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Check if tag exists
              id: tagcheck
              run: |
                  if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.version }}"; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            - name: Create tag (if missing)
              if: steps.tagcheck.outputs.exists == 'false'
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

                  git tag "${{ steps.version.outputs.version }}"
                  git push origin "${{ steps.version.outputs.version }}"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Enable Corepack
              run: corepack enable

            - name: Prepare pnpm
              run: corepack prepare pnpm@11.1.3 --activate

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build plugin
              run: pnpm run build

            - name: Attest build provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css

            - name: Create GitHub Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  TAG="${{ steps.version.outputs.version }}"

                  gh release create "$TAG" \
                    --title "$TAG" \
                    main.js manifest.json styles.css
