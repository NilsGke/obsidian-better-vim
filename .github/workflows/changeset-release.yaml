name: Changeset Release

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    version-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Enable Corepack (pnpm)
              run: corepack enable

            - name: Prepare pnpm
              run: corepack prepare pnpm@11.1.3 --activate

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check for changesets
              id: changesets
              run: |
                  PENDING=$(find .changeset -maxdepth 1 -type f -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')
                  if [ "$PENDING" -gt 0 ]; then
                      echo "pending=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "pending=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Version packages
              if: steps.changesets.outputs.pending == 'true'
              run: pnpm changeset version

            - name: Sync Obsidian manifest versions
              if: steps.changesets.outputs.pending == 'true'
              run: pnpm run version

            - name: Build plugin (esbuild)
              if: steps.changesets.outputs.pending == 'true'
              run: pnpm run build

            - name: Read version
              if: steps.changesets.outputs.pending == 'true'
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "value=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Commit version bump
              if: steps.changesets.outputs.pending == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add package.json pnpm-lock.yaml manifest.json versions.json .changeset
                  if [ -f CHANGELOG.md ]; then
                      git add CHANGELOG.md
                  fi
                  git commit -m "chore(release): ${{ steps.version.outputs.value }}"
                  git tag "${{ steps.version.outputs.value }}"
                  git push origin main --follow-tags

            - name: Create GitHub release
              if: steps.changesets.outputs.pending == 'true'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ steps.version.outputs.value }}" \
                    --title "${{ steps.version.outputs.value }}" \
                    --generate-notes \
                    main.js manifest.json styles.css
